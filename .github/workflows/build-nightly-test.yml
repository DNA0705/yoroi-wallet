name: Build Nightly for Testing

on:
  workflow_dispatch:  # You can trigger manually from the GitHub Actions UI

jobs:
  build-nightly:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Read Node Version from .nvmrc
        id: nvm
        run: echo "NVMRC=$(cat .nvmrc)" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "${{ steps.nvm.outputs.NVMRC }}"

      - name: Install Dependencies
        run: |
          . install-all.sh

      - name: Run Lint
        run: npm run eslint

      - name: Run TypeScript
        run: npm run tsc

      - name: Run Tests
        run: npm run test

      - name: Build Nightly App
        working-directory: ./packages/yoroi-extension
        run: |
          npm run prod:nightly

      - name: Zip Build Folder
        working-directory: ./packages/yoroi-extension
        run: |
          cd dist && zip -r ../yoroi-nightly.zip . && cd ..

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yoroi-nightly-build
          path: ./packages/yoroi-extension/yoroi-nightly.zip
